name: Bump version PR

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions: {}

jobs:
  bump_version_pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      TAG: ${{ inputs.tag_name }}
      BRANCH: "bump/${{ inputs.tag_name }}"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install go-licenses
        run: go install github.com/google/go-licenses/v2@latest

      - name: Update version.go
        run: |
          VERSION=${TAG#v}
          sed -i "s/var Version = \".*\"/var Version = \"${VERSION}\"/" version/version.go

      - name: Generate LICENSES
        run: |
          {
            printf '%s\n' '{{range .}}================================================================================'
            printf '%s\n' 'Package: {{.Name}}'
            printf '%s\n' 'License: {{.LicenseName}}'
            printf '%s\n' 'URL: {{.LicenseURL}}'
            printf '%s\n' '================================================================================'
            printf '%s\n' '{{.LicenseText}}'
            printf '%s\n' '{{end}}'
          } > "${RUNNER_TEMP}/licenses.tmpl"

          {
            printf '================================================================================\n'
            printf 'Package: Go standard library (%s)\n' "$(go env GOVERSION)"
            printf 'License: BSD-3-Clause\n'
            printf 'URL: https://cs.opensource.google/go/go/+/refs/tags/%s:LICENSE\n' "$(go env GOVERSION)"
            printf '================================================================================\n'
            cat "$(go env GOROOT)/LICENSE"
            printf '\n'
          } > third_party/LICENSES
          go-licenses report ./... --template="${RUNNER_TEMP}/licenses.tmpl" 2>/dev/null >> third_party/LICENSES

      - name: Check diff
        id: check-diff
        run: |
          if git diff --quiet; then
            echo "No changes"
            echo "diff=0" >> "${GITHUB_OUTPUT}"
          else
            echo "diff=1" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit changes
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        if: steps.check-diff.outputs.diff == '1'
        with:
          commit_message: "Bump version to ${{ inputs.tag_name }}"
          branch: ${{ env.BRANCH }}
          force_push: true
          files: |
            version/version.go
            third_party/LICENSES

      - name: Create pull request
        if: steps.check-diff.outputs.diff == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --title "Release ${TAG}" \
              --body "Bump version to ${TAG}" \
              --base main \
              --head "${BRANCH}"
          fi
